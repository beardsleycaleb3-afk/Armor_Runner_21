<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FOOTBALL RPG RUNNER 21</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { 
    background:#0a0a1f; 
    overflow:hidden; 
    height:100dvh; 
    font-family:'Courier New', monospace; 
    touch-action:none; 
  }
  #game { position:relative; width:100vw; height:100dvh; }
  canvas { display:block; }

  #hud {
    position:absolute; top:15px; left:0; right:0; padding:0 20px; z-index:30;
    color:#ffd700; font-size:18px; display:flex; justify-content:space-between;
    text-shadow: 0 0 8px #000, 2px 2px 0 #000;
    font-weight: bold;
  }
  .controls {
    position:absolute; bottom:30px; left:0; right:0; 
    display:flex; justify-content:space-between; padding:0 25px;
    pointer-events:none;
  }
  button {
    width:85px; height:85px; 
    background:rgba(255,215,0,0.18); 
    border:5px solid #ffd700;
    color:#ffd700; 
    font-size:36px; 
    font-weight:bold; 
    border-radius:22px;
    box-shadow:0 10px 0 #000;
    pointer-events:auto;
  }
  button:active { 
    transform:translateY(6px); 
    box-shadow:0 3px 0 #000; 
  }
  #msg {
    position:absolute; top:60px; left:50%; transform:translateX(-50%);
    color:#ffeb3b; font-size:22px; font-weight:bold;
    text-shadow: 3px 3px 0 #000; opacity:0; transition:opacity 0.4s;
    z-index:40;
  }
</style>
</head>
<body>

<div id="game">
  <canvas id="canvas"></canvas>

  <div id="hud">
    <div>STAGE <span id="stage">1</span> • LV <span id="level">1</span></div>
    <div><span id="yards">0</span> / <span id="goal">100</span> YDS</div>
  </div>

  <div id="msg"></div>

  <div class="controls">
    <!-- D-Pad -->
    <div style="display:grid; grid-template-columns:repeat(3,85px); gap:6px;">
      <div></div>
      <button id="up">▲</button>
      <div></div>
      <button id="left">◀</button>
      <button id="down">▼</button>
      <button id="right">▶</button>
    </div>

    <!-- Action Buttons -->
    <div style="display:grid; grid-template-columns:repeat(2,85px); gap:14px;">
      <button id="y" style="border-color:#ff5722;">Y</button>
      <button id="x" style="border-color:#2196f3;">X</button>
      <button id="b" style="border-color:#fbc02d;">B</button>
      <button id="a" style="border-color:#4caf50;">A</button>
    </div>
  </div>
</div>

<script type="module">
import * as THREE from "https://esm.sh/three@0.177.0";

const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(2, window.devicePixelRatio));

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a1f3a);
scene.fog = new THREE.Fog(0x0a1f3a, 30, 120);

const camera = new THREE.PerspectiveCamera(68, window.innerWidth / window.innerHeight, 0.1, 300);
camera.position.set(0, 14, 26);

scene.add(new THREE.AmbientLight(0xffffff, 0.9));
const sun = new THREE.DirectionalLight(0xffdd88, 1.1);
sun.position.set(15, 30, 18);
scene.add(sun);

// Ground (football field style)
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(42, 900),
  new THREE.MeshLambertMaterial({ color: 0x1b5e20 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.z = -220;
scene.add(ground);

// Player using sprite sheet
let playerMesh = null;
let currentFrame = 0;
let animRow = 0;        // 0=idle, 1=run, 2=jump/hurdle, 3=spin, 4=plow, 5=slide, 6=hit
const COLS = 8;
const ROWS = 8;

async function loadPlayer() {
  try {
    const loader = new THREE.TextureLoader();
    const texture = await loader.loadAsync('assets/player/player_spritesheet.png');
    
    texture.magFilter = THREE.NearestFilter;
    texture.minFilter = THREE.NearestFilter;

    const geo = new THREE.PlaneGeometry(8, 12);
    const mat = new THREE.MeshBasicMaterial({
      map: texture,
      transparent: true,
      side: THREE.DoubleSide,
      alphaTest: 0.1
    });

    playerMesh = new THREE.Mesh(geo, mat);
    playerMesh.position.set(0, 6, 0);
    scene.add(playerMesh);
    
    console.log("Player sprite loaded successfully");
  } catch (e) {
    console.warn("Sprite sheet not found yet. Using placeholder player.");
    // Placeholder capsule player (so you can test without sprite sheet)
    const geo = new THREE.CapsuleGeometry(1.8, 5, 8, 16);
    const mat = new THREE.MeshLambertMaterial({ color: 0x1e88e5 });
    playerMesh = new THREE.Mesh(geo, mat);
    playerMesh.position.set(0, 5, 0);
    scene.add(playerMesh);
  }
}

// Game variables
let speed = 24;
let lane = 0;           // -2 to 2
let yards = 0;
let isTurbo = false;
let msgTimeout = null;

function showMessage(text) {
  const msgEl = document.getElementById('msg');
  msgEl.textContent = text;
  msgEl.style.opacity = 1;
  clearTimeout(msgTimeout);
  msgTimeout = setTimeout(() => msgEl.style.opacity = 0, 1200);
}

// Main game loop
function gameLoop() {
  const dt = 0.016;

  if (playerMesh) {
    // Forward movement
    const currentSpeed = isTurbo ? speed * 1.6 : speed;
    playerMesh.position.z -= currentSpeed * dt;
    yards += currentSpeed * dt * 0.7;

    // Smooth lane switching
    const targetX = lane * 6;
    playerMesh.position.x += (targetX - playerMesh.position.x) * 0.25;

    // Running animation (if sprite sheet is loaded)
    if (playerMesh.material.map) {
      currentFrame = (currentFrame + (isTurbo ? 0.5 : 0.3)) % COLS;
      animRow = 1; // running row
      const u = (currentFrame % COLS) / COLS;
      const v = animRow / ROWS;
      playerMesh.material.map.offset.set(u, 1 - v - (1/ROWS));
      playerMesh.material.map.repeat.set(1/COLS, 1/ROWS);
    }
  }

  // Update HUD
  document.getElementById('yards').textContent = Math.floor(yards);

  // Camera follow (dynamic chase cam)
  if (playerMesh) {
    camera.position.z = playerMesh.position.z + 27;
    camera.lookAt(playerMesh.position.x, 7.5, playerMesh.position.z - 20);
  }

  renderer.render(scene, camera);
  requestAnimationFrame(gameLoop);
}

// Input handling
function setupControls() {
  const buttons = {
    left: document.getElementById('left'),
    right: document.getElementById('right'),
    up: document.getElementById('up'),
    down: document.getElementById('down'),
    a: document.getElementById('a'),
    b: document.getElementById('b'),
    x: document.getElementById('x'),
    y: document.getElementById('y')
  };

  Object.keys(buttons).forEach(key => {
    const btn = buttons[key];
    
    btn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      
      if (key === 'left') lane = Math.max(-2, lane - 1);
      if (key === 'right') lane = Math.min(2, lane + 1);
      
      if (key === 'up' || key === 'x') {
        showMessage("HURDLE!");
        animRow = 2;
      }
      if (key === 'down') {
        showMessage("SLIDE!");
        animRow = 5;
      }
      if (key === 'a') {
        showMessage("SPIN!");
        animRow = 3;
      }
      if (key === 'b') {
        showMessage("PLOW!");
        animRow = 4;
      }
      if (key === 'y') {
        isTurbo = true;
        showMessage("TURBO!");
      }

      // Reset action animation after short time
      setTimeout(() => {
        if (animRow >= 2) animRow = 1;
      }, 450);
    });

    if (key === 'y') {
      btn.addEventListener('touchend', () => isTurbo = false);
    }
  });
}

// Handle resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Start everything
loadPlayer();
setupControls();
gameLoop();

console.log("%cFOOTBALL RPG RUNNER 21 - Demo Ready", "color:#ffd700; font-size:16px");
</script>
</body>
</html>
