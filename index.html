<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a1a">
  <meta name="background-color" content="#111827">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Running Back Rising">
  
  <title>Armor_Runner_21</title>
  
  <!-- PWA MANIFEST -->
  <link rel="manifest" href="manifest.json">
  
  <!-- Tailwind CDN (for the exact classes in your original HTML) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Favicon / PWA icons (add your own 192x192 & 512x512 PNGs) -->
  <link rel="icon" href="icon-192.png" sizes="192x192">
  <link rel="apple-touch-icon" href="icon-192.png">
  
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-gray-900 text-white overflow-hidden" style="margin:0;padding:0;">
  <div id="game-root" style="width:100vw;height:100svh;position:relative;overflow:hidden;">
    <div id="screen-menu" class="screen flex flex-col items-center justify-center h-full">
      <div class="menu-bg absolute inset-0"></div>
      <div class="relative z-10 flex flex-col items-center gap-4 px-4 text-center">
        <div class="text-6xl mb-2">🏈</div>
        <h1 class="text-4xl md:text-5xl font-black tracking-wider text-yellow-400 drop-shadow-lg" style="text-shadow:0 0 30px #f59e0b">RUNNINGG</h1>
        <p class="text-lg text-gray-300 italic">From Freshman to Bowl Champion</p>
        <div class="mt-4 bg-gray-800 bg-opacity-80 rounded-xl p-4 max-w-xs text-sm text-gray-300">
        </div>
        <button id="btn-start" class="mt-6 px-10 py-4 bg-yellow-400 text-gray-900 font-black text-2xl rounded-full shadow-xl hover:bg-yellow-300 active:scale-95 transition-all uppercase tracking-widest">CAREER</button>
        <button id="btn-continue" class="hidden px-8 py-3 bg-green-500 text-white font-bold text-lg rounded-full shadow hover:bg-green-400 transition-all">💾</button>
      </div>
    </div>

    
    <div id="screen-career" class="screen hidden flex-col items-center justify-start h-full overflow-y-auto py-6">
      <div class="career-bg absolute inset-0"></div>
      <div class="relative z-10 w-full max-w-lg px-4">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-2xl font-black text-yellow-400">CAREER PATH</h2>
          <div id="career-stats-bar" class="text-sm text-gray-300 text-right">XP: <span id="total-xp">0</span> • STARS: <span id="total-stars">0</span></div>
        </div>
        <div id="career-rpg-bar" class="mb-4 bg-gray-800 bg-opacity-80 rounded-xl p-3 flex gap-4 text-sm flex-wrap justify-center"></div>
        <div id="career-chapters" class="flex flex-col gap-3"></div>
      </div>
    </div>

    <!-- UPGRADE SHOP / CUTSCENE / RESULTS / BOWL screens remain exactly as you pasted (empty for now) -->
    <!-- ... (all your other screens unchanged – they are ready for future expansion) ... -->

    <!-- GAME CANVAS SCREEN – DAN-64 ENGINE LIVES HERE -->
    <div id="screen-game" class="screen hidden relative h-full bg-[#050505]">
      <!-- DAN-64 Canvas (320×240 internal, pixel-perfect scaled to full screen) -->
      <canvas id="game-canvas" width="320" height="240" class="absolute inset-0 mx-auto my-auto" style="image-rendering:pixelated; max-width:100%; max-height:100%;"></canvas>

      <!-- Your original HUD (overlaid on top of DAN-64 canvas) -->
      <div id="hud" class="absolute top-0 left-0 right-0 pointer-events-none">
        <div class="flex items-start justify-between px-3 pt-2 gap-2">
          <div class="bg-black bg-opacity-60 rounded-lg px-3 py-1 text-sm font-bold">
            <span id="hud-stage" class="text-yellow-400">FRESHMAN YEAR</span>
          </div>
          <div class="bg-black bg-opacity-60 rounded-lg px-3 py-1 text-center text-sm font-bold">
            <div id="hud-yards" class="text-green-400 text-lg leading-tight">0 YDS</div>
            <div id="hud-timer" class="text-white text-xs">TIME: 0.0s</div>
          </div>
          <div class="bg-black bg-opacity-60 rounded-lg px-3 py-1 text-sm font-bold text-right">
            <div id="hud-score" class="text-yellow-400">⭐ 0</div>
            <div id="hud-health" class="text-red-400 text-xs"> 🏈 🏈 🏈 </div>
          </div>
        </div>
        <div class="flex justify-center mt-1">
          <div class="bg-black bg-opacity-50 rounded px-2 py-0.5 text-xs text-gray-400" id="hud-hint">TAP TO JUKE • HOLD A TO SPRINT</div>
        </div>
      </div>

      <!-- SPRINT BAR (syncs with DAN-64 stability) -->
      <div class="absolute bottom-20 left-1/2 -translate-x-1/2 w-40 pointer-events-none">
        <div class="text-xs text-center text-gray-300 mb-1">SPRINT</div>
        <div class="h-3 bg-gray-700 rounded-full overflow-hidden">
          <div id="sprint-bar" class="h-full bg-yellow-400 transition-all rounded-full" style="width:100%"></div>
        </div>
      </div>

      <!-- TOUCH CONTROLS – mapped directly to DAN-64 input (pure touch, no mouse) -->
      <div id="touch-controls" class="absolute bottom-4 left-0 right-0 flex justify-between px-6 pointer-events-auto">
        <!-- Left side: lateral jukes -->
        <div class="flex gap-2">
          <button class="touch-btn w-12 h-12 bg-gray-800 hover:bg-gray-700 active:bg-yellow-400 text-3xl rounded-2xl flex items-center justify-center shadow-inner" data-dir="left">⬅️</button>
          <button class="touch-btn w-12 h-12 bg-gray-800 hover:bg-gray-700 active:bg-yellow-400 text-3xl rounded-2xl flex items-center justify-center shadow-inner" data-dir="right">➡️</button>
        </div>

        <!-- Right side: forward / brake -->
        <div class="flex gap-2">
          <button class="touch-btn w-12 h-12 bg-gray-800 hover:bg-gray-700 active:bg-yellow-400 text-3xl rounded-2xl flex items-center justify-center shadow-inner" data-dir="up">⬆️</button>
          <button class="touch-btn w-12 h-12 bg-gray-800 hover:bg-gray-700 active:bg-yellow-400 text-3xl rounded-2xl flex items-center justify-center shadow-inner" data-dir="down">⬇️</button>
        </div>

        <!-- Extra A/B buttons (sprint / tackle) – added for full DAN-64 fidelity -->
        <div class="flex flex-col gap-2 absolute bottom-4 right-6">
          <button id="btn-A" class="touch-btn w-14 h-14 bg-red-600 hover:bg-red-500 active:bg-yellow-400 text-white text-2xl font-black rounded-3xl flex items-center justify-center shadow-2xl">A</button>
          <button id="btn-B" class="touch-btn w-14 h-14 bg-blue-600 hover:bg-blue-500 active:bg-yellow-400 text-white text-2xl font-black rounded-3xl flex items-center justify-center shadow-2xl">B</button>
        </div>
      </div>
    </div>

    <!-- RESULTS, GAMEOVER, BOWL WIN screens (unchanged from your paste) -->
    <!-- ... (kept exactly as you provided – ready to hook into DAN-64 win/fumble states) ... -->

  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
