<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Armor_Runner_21</title>
    <style>
        body { margin:0; overflow:hidden; background:#000; height:100dvh; font-family:'Courier New', monospace; touch-action:none; user-select:none; display:flex; justify-content:center; align-items:center; }
        .console { position:relative; width:100%; height:100%; max-width:600px; background:#111; display:flex; flex-direction:column; align-items:center; border-radius:15px; box-shadow:0 0 30px #ff6600; }
        .monitor { position:relative; margin-top:20px; width:350px; height:350px; background:#000; border:12px solid #222; border-radius:8px; box-shadow:0 0 25px #ff8800 inset, 0 0 40px #ff6600; overflow:hidden; }
        canvas { width:100%; height:100%; image-rendering:pixelated; }
        .controls { flex:1; width:100%; max-width:420px; display:flex; justify-content:space-around; align-items:center; padding:15px; }
        .dpad { display:grid; grid-template-columns:repeat(3,52px); gap:6px; }
        .btn { background:#1a1a1a; border:4px solid #444; color:#ddd; display:flex; align-items:center; justify-content:center; cursor:pointer; font-weight:bold; border-radius:6px; font-size:22px; }
        .btn:active { background:#444; transform: scale(0.92); box-shadow:0 0 10px #ff0; }
        .round { border-radius:50%; width:48px; height:48px; font-size:20px; }
        .square { width:52px; height:52px; }
        .btn-y { border-color:#c62828; color:#ff5252; }
        .btn-x { border-color:#1565c0; color:#42a5f5; }
        .btn-b { border-color:#f9a825; color:#ffd740; }
        .btn-a { border-color:#2e7d32; color:#66bb6a; }
        .hud { position:absolute; top:8px; left:8px; color:#0f0; font-size:13px; pointer-events:none; z-index:20; font-weight:bold; text-shadow:2px 2px 4px #000; line-height:1.2; }
        .bigtext { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#ff0; font-size:28px; font-weight:bold; text-align:center; pointer-events:none; z-index:30; text-shadow:3px 3px 6px #000; }
    </style>
</head>
<body>

<div class="console">
    <div class="monitor">
        <div class="hud" id="arHud"></div>
        <div class="bigtext" id="bigText"></div>
        <canvas id="arCanvas"></canvas>
    </div>
    <div class="controls">
        <div class="dpad">
            <div></div><div class="btn square" id="btnUp">▲</div><div></div>
            <div class="btn square" id="btnLeft">◀</div><div class="btn square" id="btnDown">▼</div><div class="btn square" id="btnRight">▶</div>
        </div>
        <div style="display:grid; grid-template-columns:repeat(2,58px); gap:12px;">
            <div class="btn round btn-y" id="btnY">⚡</div>
            <div class="btn round btn-x" id="btnX">💥</div>
            <div class="btn round btn-b" id="btnB">🌀</div>
            <div class="btn round btn-a" id="btnA">💪</div>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('arCanvas');
const ctx = canvas.getContext('2d', { alpha: true });
canvas.width = 350; canvas.height = 350;

const SKEW = 38 * Math.PI / 180;
const TILE_W = 82;
const TILE_H = 58;
const COLS = 5;
const ROWS = 220;
const LANES = [32, 92, 152, 212, 272];
const ROW_SPACING = 52;

let audioCtx;
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function playSFX(type) {
    initAudio();
    const now = audioCtx.currentTime;
    switch(type){
        case 'start': playTone(520,980,0.55,'sine',0.3); break;
        case 'turbo': playTone(80,520,0.5,'sawtooth',0.45); playNoise(0.35,0.25,900); break;
        case 'hurdle': playTone(280,920,0.09,'triangle',0.55); playTone(920,380,0.2,'sine',0.4); break;
        case 'spin': playNoise(0.38,0.4,3200); break;
        case 'truck': playNoise(0.22,0.6,550); playTone(140,75,0.3,'sawtooth',0.65); break;
        case 'item': playTone(1100,1850,0.06,'triangle',0.5); setTimeout(()=>playTone(1850,1350,0.14,'sine',0.35),35); break;
        case 'power': playTone(350,1750,0.28,'sine',0.35); playNoise(0.24,0.3,4200); break;
        case 'smash': playNoise(0.16,0.5,750); playTone(220,95,0.2,'square',0.55); break;
        case 'tackle': playNoise(0.32,0.65,420); playTone(105,62,0.38,'sawtooth',0.7); break;
        case 'td': playTone(480,720,0.12,'sine',0.4); setTimeout(()=>playTone(720,1080,0.28,'sine',0.45),70); break;
        case 'levelup': playTone(680,1100,0.1,'sine',0.35); setTimeout(()=>playTone(1100,1480,0.35,'sine',0.4),80); break;
    }
}
function playTone(s,e,d,t='sine',v=0.3){ const o=audioCtx.createOscillator(), g=audioCtx.createGain(), n=now=audioCtx.currentTime; o.type=t; o.frequency.setValueAtTime(s,n); if(e) o.frequency.exponentialRampToValueAtTime(e,n+d); g.gain.setValueAtTime(v,n); g.gain.exponentialRampToValueAtTime(0.001,n+d); o.connect(g).connect(audioCtx.destination); o.start(); o.stop(n+d+0.06); }
function playNoise(d,v=0.3,lp=1600){ const bs=audioCtx.sampleRate*d, buf=audioCtx.createBuffer(1,bs,audioCtx.sampleRate), data=buf.getChannelData(0); for(let i=0;i<bs;i++)data[i]=Math.random()*2-1; const ns=audioCtx.createBufferSource(), f=audioCtx.createBiquadFilter(), g=audioCtx.createGain(); ns.buffer=buf; f.type='lowpass'; f.frequency.value=lp; g.gain.value=v; g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d); ns.connect(f).connect(g).connect(audioCtx.destination); ns.start(); }

// Assets
const spriteMap = {
    hs:'assets/runner/hs1.gif', hsSpin:'assets/runner/hs_invincible.gif', hsHurdle:'assets/runner/hurdle1.gif',
    pro:'assets/runner/pro_tuck1.gif', proHurdle:'assets/runner/hurdle_pro.gif', down:'assets/runner/down.png',
    defenders:['assets/defenders/d1.png','assets/defenders/d2.jpeg','assets/defenders/d3.png','assets/defenders/d4.jpeg'],
    powerup:'assets/powerups/powerups.png', item:'assets/items/item.png',
    backdrops:Array.from({length:8},(_,i)=>`assets/backdrops/${i+1}.jpeg`),
    endzones:Array.from({length:8},(_,i)=>`assets/endzones/endzone${i}.png`),
    grass:Array.from({length:9},(_,i)=>`assets/grass/grass${i}.png`)
};

const sprites = {};
function loadAssets(){
    Object.keys(spriteMap).forEach(k=>{
        if(Array.isArray(spriteMap[k])){
            sprites[k] = spriteMap[k].map(src=>{const i=new Image(); i.src=src; return i;});
        }else{
            sprites[k]=new Image(); sprites[k].src=spriteMap[k];
        }
    });
}
loadAssets();

// Game Data + Career
let save = JSON.parse(localStorage.getItem('ARMOR21_SAVE')) || {
    level:1, xp:0, totalXP:0, tds:0, longestRun:0, highScore:0,
    upgrades: {turbo:1, hurdle:1, smash:1, magnet:1}
};

let gameState = 'MENU'; // MENU, RUN, PAUSE, GAMEOVER, CAREER
let worldY = 0, currentLane = 2, playerX = LANES[2];
let speedBase = 5.8, turbo=false, spinning=false, hurdling=false, trucking=false, powerActive=false, isDown=false;
let entities = [], grassScroll = 0, combo = 0, scoreThisRun = 0, distanceThisRun = 0;
let invincibleTime = 0;

function generateRun(){
    entities = [];
    const density = Math.min(0.38, 0.12 + save.level * 0.028);
    for(let r=6; r<ROWS; r++){
        if(Math.random() < density){
            entities.push({
                col: Math.floor(Math.random()*COLS),
                row: r,
                active:true,
                type: Math.random()<0.07 ? 'POWER' : (Math.random()<0.18 ? 'ITEM' : 'DEFENDER'),
                dIdx: Math.floor(Math.random()*4)
            });
        }
    }
}

function getPos(col, rowOffset){
    const depth = ROWS - rowOffset;
    let scale = Math.max(0.18, Math.cos(SKEW) * (1 - 0.0026*depth));
    const skew = Math.sin(SKEW) * (rowOffset % TILE_H) * 0.55;
    const x = 18 + col * TILE_W * scale * 0.96 + skew;
    const y = 292 - rowOffset * scale * 0.82 + (1-scale)*32;
    return {x, y, scale};
}

function update(){
    if(gameState !== 'RUN' || isDown) return;
    const speed = speedBase * (turbo ? 1.85 : 1) * (1 + save.level*0.035);
    worldY += speed;
    grassScroll = (grassScroll + speed*0.8) % ROW_SPACING;
    distanceThisRun += speed;
    scoreThisRun += Math.floor(speed * 0.6);

    // Combo decay
    if(combo > 0) combo = Math.max(0, combo - 0.018);

    entities.forEach(e=>{
        if(!e.active) return;
        const off = e.row * ROW_SPACING - worldY;
        const p = getPos(e.col, off);
        if(p.y > 242 && p.y < 318 && Math.abs(p.x - playerX) < 46){
            if(e.type==='ITEM'){
                e.active=false; save.xp += 65; scoreThisRun += 180; combo+=1.2; playSFX('item');
                if(save.upgrades.magnet > 1) invincibleTime = Date.now() + 280;
            }else if(e.type==='POWER'){
                e.active=false; powerActive=true; playSFX('power'); invincibleTime = Date.now() + 5200;
                setTimeout(()=>{powerActive=false;}, 5200);
            }else if(powerActive || spinning || trucking || invincibleTime > Date.now()){
                e.active=false; save.xp += 38; scoreThisRun += 95; combo+=0.8; playSFX('smash');
            }else if(!hurdling){
                isDown=true; playSFX('tackle'); combo=0;
                setTimeout(()=>{ 
                    isDown=false; 
                    endRun();
                }, 1050);
            }
        }
    });

    if(worldY > ROWS * ROW_SPACING * 0.92){
        playSFX('td');
        save.tds = (save.tds||0) + 1;
        save.xp += 420 + save.level*80;
        save.totalXP += save.xp;
        if(distanceThisRun > (save.longestRun||0)) save.longestRun = Math.floor(distanceThisRun);
        save.highScore = Math.max(save.highScore||0, scoreThisRun);
        localStorage.setItem('ARMOR21_SAVE', JSON.stringify(save));
        showBigText("TOUCHDOWN!", "#0f0", 1600);
        setTimeout(showCareerScreen, 1650);
    }
    updateHUD();
}

function updateHUD(){
    const era = save.level <=3 ? 'HS' : (save.level<=6?'COLLEGE':'PRO');
    document.getElementById('arHud').innerHTML = `${era} LVL ${save.level}<br>XP \( {save.xp} • COMBO x \){combo.toFixed(1)}`;
}

function draw(){
    ctx.fillStyle = '#0a0a1a'; ctx.fillRect(0,0,350,350);

    const bg = sprites.backdrops[(save.level-1)%8];
    if(bg?.complete) ctx.drawImage(bg,0,0,350,172);

    // Improved flat connected field
    const g = sprites.grass[(save.level-1)%9];
    if(g?.complete){
        for(let r=-3; r<19; r++){
            for(let c=0; c<COLS; c++){
                const off = r*ROW_SPACING + grassScroll;
                const p = getPos(c, off);
                if(p.y > -40 && p.y < 390){
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.scale(p.scale*1.12, p.scale*0.88);
                    ctx.drawImage(g, -TILE_W/2, -TILE_H/2 - 6, TILE_W, TILE_H+12);
                    ctx.restore();
                }
            }
        }
    }

    if(gameState === 'RUN'){
        // Endzone
        const ez = sprites.endzones[(save.level-1)%8];
        const ezY = 295 - (ROWS*ROW_SPACING - worldY)*0.78;
        if(ezY>125 && ez?.complete) ctx.drawImage(ez,0,ezY,350,155);

        // Entities
        entities.forEach(e=>{
            if(!e.active) return;
            const off = e.row*ROW_SPACING - worldY;
            const p = getPos(e.col, off);
            if(p.y > -50 && p.y < 380 && p.scale > 0.22){
                let img = e.type==='POWER' ? sprites.powerup : (e.type==='ITEM'?sprites.item:sprites.defenders[e.dIdx]);
                if(img?.complete){
                    ctx.save();
                    ctx.translate(p.x, p.y-12);
                    ctx.scale(p.scale*1.05, p.scale*1.05);
                    ctx.drawImage(img, -29, -36, 58, 72);
                    ctx.restore();
                }
            }
        });

        // Player with better animation feel
        let spr = isDown ? sprites.down : 
                 (powerActive || spinning ? sprites.hsSpin : 
                 (hurdling ? (save.level<=3 ? sprites.hsHurdle : sprites.proHurdle) : 
                 (save.level<=3 ? sprites.hs : sprites.pro)));
        if(spr?.complete){
            ctx.save();
            const py = 254 + (hurdling ? -48 : (isDown ? 22 : 0));
            ctx.translate(playerX, py);
            ctx.scale(3.15, 3.15);
            if(powerActive || invincibleTime > Date.now()) ctx.filter = "drop-shadow(0 0 18px #0ff) brightness(1.45)";
            ctx.drawImage(spr, -33, -44, 66, 88);
            ctx.restore();
        }
    } else if(gameState === 'MENU'){
        ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0,0,350,350);
        ctx.fillStyle = "#ff0"; ctx.font = "bold 26px Courier New"; ctx.textAlign="center";
        ctx.fillText("ARMOR", 175, 110);
        ctx.fillText("RUNNER 21", 175, 145);
        ctx.font = "18px Courier New"; ctx.fillStyle="#0f0";
        ctx.fillText("TAP ⚡ TO START CAREER", 175, 240);
    }

    requestAnimationFrame(draw);
}

function showBigText(txt, col, ms=1200){
    const el = document.getElementById('bigText');
    el.style.color = col;
    el.textContent = txt;
    setTimeout(()=>{ el.textContent=''; }, ms);
}

function endRun(){
    // Save best run
    if(distanceThisRun > (save.longestRun||0)) save.longestRun = Math.floor(distanceThisRun);
    localStorage.setItem('ARMOR21_SAVE', JSON.stringify(save));
    showBigText("DOWN!", "#f44", 1100);
    setTimeout(()=>{ 
        gameState = 'MENU'; 
        worldY=0; 
        scoreThisRun=0; 
        distanceThisRun=0; 
        combo=0;
    }, 1150);
}

function showCareerScreen(){
    gameState = 'CAREER';
    ctx.fillStyle = "rgba(5,5,15,0.96)"; ctx.fillRect(0,0,350,350);
    ctx.fillStyle = "#0f0"; ctx.font = "bold 21px Courier New"; ctx.textAlign="center";
    ctx.fillText("CAREER PROGRESS", 175, 55);

    ctx.font = "16px Courier New"; ctx.fillStyle="#ddd";
    const era = save.level<=3?'HIGH SCHOOL':(save.level<=6?'COLLEGE':'PRO');
    ctx.fillText(`${era} • LEVEL ${save.level}`, 175, 95);
    ctx.fillText(`XP THIS RUN: ${save.xp}`, 175, 125);
    ctx.fillText(`TOTAL TOUCHDOWNS: ${save.tds||0}`, 175, 155);
    ctx.fillText(`LONGEST RUN: ${Math.floor(save.longestRun||0)}`, 175, 185);
    ctx.fillText(`HIGH SCORE: ${save.highScore||0}`, 175, 215);

    ctx.fillStyle = "#ff0"; ctx.font = "bold 19px Courier New";
    ctx.fillText("TAP ANYWHERE TO CONTINUE", 175, 290);

    // Simple upgrade tease
    if(save.xp > 300){
        ctx.fillStyle="#0ff"; ctx.fillText("UPGRADES AVAILABLE!", 175, 260);
    }

    canvas.onclick = () => {
        canvas.onclick = null;
        if(save.level >= 9){
            showBigText("CHAMPION!", "#ff0", 2200);
            setTimeout(()=>{ save.level=1; save.xp=0; localStorage.setItem('ARMOR21_SAVE',JSON.stringify(save)); gameState='MENU'; }, 2300);
        } else {
            save.level++;
            save.xp = Math.floor(save.xp * 0.6); // carry some over
            localStorage.setItem('ARMOR21_SAVE', JSON.stringify(save));
            startNewRun();
        }
    };
}

function startNewRun(){
    gameState = 'RUN';
    worldY = 0;
    scoreThisRun = 0;
    distanceThisRun = 0;
    combo = 0;
    generateRun();
    showBigText("GO!", "#0f0", 800);
    playSFX('start');
}

function input(id, isDown){
    if(id === 'btnY' && isDown){
        if(gameState === 'MENU') startNewRun();
        else if(gameState === 'RUN') turbo = true;
    }
    if(gameState !== 'RUN' || isDown) return; // isDown var conflict, careful

    if(isDown){
        if(id==='btnLeft' && currentLane>0){ currentLane--; playerX=LANES[currentLane]; }
        if(id==='btnRight' && currentLane<4){ currentLane++; playerX=LANES[currentLane]; }
        if(id==='btnB'){ spinning=true; setTimeout(()=>spinning=false,480); playSFX('spin'); combo+=0.6; }
        if(id==='btnX'){ hurdling=true; setTimeout(()=>hurdling=false,680); playSFX('hurdle'); }
        if(id==='btnA'){ trucking=true; setTimeout(()=>trucking=false,380); playSFX('truck'); combo+=0.4; }
    } else {
        if(id==='btnY') turbo=false;
    }
}

// Button listeners
['btnLeft','btnRight','btnY','btnA','btnX','btnB'].forEach(id=>{
    const el = document.getElementById(id);
    el.addEventListener('touchstart', e=>{e.preventDefault(); input(id,true);});
    el.addEventListener('touchend', e=>{e.preventDefault(); input(id,false);});
});

// Keyboard support for testing
document.addEventListener('keydown', e=>{
    if(e.key==='ArrowLeft') input('btnLeft',true);
    if(e.key==='ArrowRight') input('btnRight',true);
    if(e.key===' ' || e.key==='Shift') input('btnY',true);
    if(e.key==='z' || e.key==='Z') input('btnX',true);
    if(e.key==='x' || e.key==='X') input('btnB',true);
    if(e.key==='c' || e.key==='C') input('btnA',true);
});

setInterval(update, 1000/65);
draw();
loadAssets();
updateHUD();
</script>
</body>
</html>
